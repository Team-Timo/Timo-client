name: 📦 번들 사이즈 리포트

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bundle-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-size:
    name: Bundle Size Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build timo-web
        env:
          TURBO_UI: false
          NO_COLOR: '1'
        run: pnpm turbo run build --filter=timo-web --log-output=full 2>&1 | tee /tmp/timo-web-build.txt
        continue-on-error: true

      - name: Debug - 빌드 출력 확인
        if: always()
        run: |
          echo "=== timo-web (마지막 50줄) ==="
          tail -50 /tmp/timo-web-build.txt 2>/dev/null || echo "(파일 없음)"

      - name: 번들 사이즈 PR 코멘트 게시
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fn = require('./.github/scripts/bundle-size-report.js')
            await fn({ github, context, core })
