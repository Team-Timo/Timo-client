name: Auto Label

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  label-by-files:
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: false

  label-pr:
    if: github.event_name == 'pull_request' && github.event.action != 'synchronize'
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const prNumber = pr.number;

            const prefixMap = {
              '[FEAT]':     '✨ Feature',
              '[FIX]':      '🐛 Bug',
              '[CHORE]':    '🧹 CHORE',
              '[INIT]':     '🛠️ Setup',
              '[DOCS]':     '📝 Docs',
              '[CI]':       '😎 DevOps',
              '[TEST]':     '🌊 TEST',
              '[REFACTOR]': '♻ Refactor',
              '[UI]':       '⌚ Timo-Design-system',
              '[STYLE]':    '⌚ Timo-Design-system',
              '[PERF]':     '✨ Feature',
              '[API]':      '🌟 API',
            };
            const authorMap = {
              'kimminna':   '♦️ 민아',
              'ehye1':      '♥️ 혜원',
              'jjangminii': '♠️ 정민',
              'yumin-kim2': '♣️ 유민',
            };

            // --- prefix 라벨 ---
            // edited 이벤트는 본문 수정만으로도 트리거되므로 제목 변경 여부를 확인
            if (action !== 'edited' || context.payload.changes?.title) {
              const allPrefixLabels = [...new Set(Object.values(prefixMap))];
              const match = Object.entries(prefixMap).find(([prefix]) => pr.title.startsWith(prefix));

              const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
              for (const label of currentLabels) {
                if (allPrefixLabels.includes(label.name)) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    name: label.name,
                  });
                }
              }
              if (match) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: [match[1]],
                });
              }
            }

            // --- 작성자 라벨 (opened / reopened 시에만) ---
            if (action === 'opened' || action === 'reopened') {
              const label = authorMap[pr.user.login];
              if (label) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: [label],
                });
              }
            }

  label-issues:
    if: github.event_name == 'issues'
    permissions:
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const authorMap = {
              'kimminna':   '♦️ 민아',
              'ehye1':      '♥️ 혜원',
              'jjangminii': '♠️ 정민',
              'yumin-kim2': '♣️ 유민',
            };

            const label = authorMap[context.payload.issue.user.login];
            if (!label) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [label],
            });
