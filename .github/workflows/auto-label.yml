name: Auto Label

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  issues:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-by-files:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: false

  label-by-prefix:
    if: github.event_name == 'pull_request' && github.event.action != 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const prefixMap = {
              '[FEAT]':     '✨ Feature',
              '[FIX]':      '🐛 Bug',
              '[CHORE]':    '🧹 CHORE',
              '[INIT]':     '🛠️ Setup',
              '[DOCS]':     '📝 Docs',
              '[CI]':       '😎 DevOps',
              '[TEST]':     '🌊 TEST',
              '[REFACTOR]': '♻ Refactor',
              '[UI]':       '⌚ Timo-Design-system',
              '[STYLE]':    '⌚ Timo-Design-system',
              '[PERF]':     '✨ Feature',
              '[API]':      '🌟 API',
            };

            // edited 이벤트는 본문 수정만으로도 트리거되므로 제목 변경 여부를 확인
            if (context.payload.action === 'edited' && !context.payload.changes?.title) return;

            const allPrefixLabels = [...new Set(Object.values(prefixMap))];
            const match = Object.entries(prefixMap).find(([prefix]) => title.startsWith(prefix));

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            for (const label of currentLabels) {
              if (allPrefixLabels.includes(label.name)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: label.name,
                });
              }
            }

            if (!match) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [match[1]],
            });

  label-by-author:
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const authorMap = {
              'kimminna':   '♦️ 민아',
              'ehye1':      '♥️ 혜원',
              'jjangminii': '♠️ 정민',
              'yumin-kim2': '♣️ 유민',
            };

            const author = context.payload.pull_request.user.login;
            const label = authorMap[author];

            if (!label) {
              console.log(`"${author}"에 대한 라벨 매핑이 없습니다.`);
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });

  issue-label-by-author:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const authorMap = {
              'kimminna':   '♦️ 민아',
              'ehye1':      '♥️ 혜원',
              'jjangminii': '♠️ 정민',
              'yumin-kim2': '♣️ 유민',
            };

            const author = context.payload.issue.user.login;
            const label = authorMap[author];

            if (!label) {
              console.log(`"${author}"에 대한 라벨 매핑이 없습니다.`);
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [label],
            });
